<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地文本加密解密工具-彻底去除按钮高亮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            max-width: 680px;
            margin: 40px auto;
            padding: 0 16px;
            background: #f0f4f9;
            /* 移动端全局点击高亮清除 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .main-card {
            background: #ffffff;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }
        
        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 24px;
            font-size: 22px;
        }
        
        .form-item {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
        }
        
        textarea,
        input,
        select {
            width: 100%;
            padding: 13px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            outline: none !important;
        }
        
        textarea {
            min-height: 140px;
            resize: vertical;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        /* 恢复原版按钮配色 */
        
        button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            /* 清除移动端点击高亮 */
            -webkit-tap-highlight-color: transparent;
        }
        
        #encryptBtn {
            background: #2563eb;
            color: #fff;
        }
        
        #decryptBtn {
            background: #059669;
            color: #fff;
        }
        
        #clearBtn {
            background: #e2e8f0;
            color: #1e293b;
        }
        /* 核心：彻底干掉浏览器默认焦点虚线高亮 */
        
        button:focus,
        button:focus-visible,
        .modal-copy-btn:focus,
        .modal-copy-btn:focus-visible,
        .modal-close-btn:focus,
        .modal-close-btn:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }
        
        .tips {
            margin-top: 18px;
            font-size: 13px;
            color: #64748b;
        }
        /* 页面整体禁止拖拽选中文本高亮 */
        
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 输入框、弹窗文本允许选中文字 */
        
        textarea,
        input,
        .modal-content {
            -webkit-user-select: text;
            user-select: text;
        }
        /* 自定义弹窗遮罩 */
        
        .modal-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        
        .modal-box {
            width: 90%;
            max-width: 550px;
            background: #fff;
            border-radius: 14px;
            padding: 24px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 14px;
            color: #222;
        }
        
        .modal-content {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 16px;
        }
        
        .modal-btn-wrap {
            display: flex;
            gap: 10px;
        }
        
        .modal-copy-btn {
            flex: 1;
            padding: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .modal-close-btn {
            flex: 1;
            padding: 12px;
            background: #e2e8f0;
            color: #1e293b;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <div class="main-card">
        <div class="form-item">
            <label>选择加密算法</label>
            <select id="algorithm">
            <option value="AES">AES（推荐可逆）</option>
            <option value="DES">DES</option>
            <option value="3DES">3DES</option>
            <option value="RC4">RC4</option>
            <option value="Base64">Base64</option>
            <option value="MD5">MD5（不可逆）</option>
            <option value="SHA256">SHA256（不可逆）</option>
        </select>
        </div>
        <div class="form-item">
            <label>输入内容（明文/密文）</label>
            <textarea id="inputText" placeholder="在这里输入文字"></textarea>
        </div>
        <div class="form-item" id="keyBox">
            <label>密钥密码</label>
            <input type="password" id="keyInput" placeholder="加密解密统一密码">
        </div>
        <div class="btn-group">
            <button id="encryptBtn">加密</button>
            <button id="decryptBtn">解密</button>
            <button id="clearBtn">清空全部</button>
        </div>
        <div class="tips">
            可逆算法：AES、DES、3DES、RC4、Base64；MD5/SHA256
        </div>
    </div>
    <!-- 自定义弹窗结构 复制+关闭按钮 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-content" id="modalText"></div>
            <div class="modal-btn-wrap">
                <button class="modal-copy-btn" id="modalCopyBtn">复制内容</button>
                <button class="modal-close-btn" id="modalCloseBtn">关闭</button>
            </div>
        </div>
    </div>
    <script>
        var inputText = document.getElementById("inputText");
        var keyInput = document.getElementById("keyInput");
        var algorithm = document.getElementById("algorithm");
        var keyBox = document.getElementById("keyBox");
        var encryptBtn = document.getElementById("encryptBtn");
        var decryptBtn = document.getElementById("decryptBtn");
        var clearBtn = document.getElementById("clearBtn");
        // 弹窗元素
        var modalMask = document.getElementById("modalMask");
        var modalTitle = document.getElementById("modalTitle");
        var modalText = document.getElementById("modalText");
        var modalCopyBtn = document.getElementById("modalCopyBtn");
        var modalCloseBtn = document.getElementById("modalCloseBtn");
        var currentModalText = "";
        // 关闭弹窗
        modalCloseBtn.onclick = function() {
                modalMask.style.display = "none";
            }
            // 复制弹窗文字
        modalCopyBtn.onclick = async function() {
                try {
                    await navigator.clipboard.writeText(currentModalText);
                    showModal("复制成功", "弹窗内文本已复制到剪贴板");
                } catch (err) {
                    showModal("复制失败", "浏览器不支持剪贴板复制，请手动选中文字复制");
                }
            }
            // 打开弹窗
        function showModal(title, text) {
            currentModalText = text;
            modalTitle.innerText = title;
            modalText.innerText = text;
            modalMask.style.display = "flex";
        }
        // 切换算法隐藏密钥框
        algorithm.onchange = function() {
                var nowType = algorithm.value;
                if (nowType == "MD5" || nowType == "SHA256") {
                    keyBox.style.display = "none";
                } else {
                    keyBox.style.display = "block";
                }
            }
            // 加密按钮
        encryptBtn.onclick = function() {
                var textContent = inputText.value.trim();
                var password = keyInput.value.trim();
                var type = algorithm.value;
                var result = "";
                if (textContent.length <= 0) {
                    showModal("提示", "请输入需要加密的内容！");
                    return;
                }
                try {
                    if (type == "AES") {
                        if (password.length <= 0) {
                            showModal("提示", "AES加密必须填写密钥！");
                            return;
                        }
                        var encryptRes = CryptoJS.AES.encrypt(textContent, password);
                        result = encryptRes.toString();
                    } else if (type == "DES") {
                        if (password.length <= 0) {
                            showModal("提示", "DES加密必须填写密钥！");
                            return;
                        }
                        var encryptRes = CryptoJS.DES.encrypt(textContent, password);
                        result = encryptRes.toString();
                    } else if (type == "3DES") {
                        if (password.length <= 0) {
                            showModal("提示", "3DES加密必须填写密钥！");
                            return;
                        }
                        var encryptRes = CryptoJS.TripleDES.encrypt(textContent, password);
                        result = encryptRes.toString();
                    } else if (type == "RC4") {
                        if (password.length <= 0) {
                            showModal("提示", "RC4加密必须填写密钥！");
                            return;
                        }
                        var encryptRes = CryptoJS.RC4.encrypt(textContent, password);
                        result = encryptRes.toString();
                    } else if (type == "Base64") {
                        var utf8Word = CryptoJS.enc.Utf8.parse(textContent);
                        result = CryptoJS.enc.Base64.stringify(utf8Word);
                    } else if (type == "MD5") {
                        var md5Word = CryptoJS.MD5(textContent);
                        result = md5Word.toString();
                    } else if (type == "SHA256") {
                        var shaWord = CryptoJS.SHA256(textContent);
                        result = shaWord.toString();
                    }
                } catch (err) {
                    showModal("加密失败", err.message);
                    return;
                }
                inputText.value = result;
                showModal("加密完成，密文如下", result);
            }
            // 解密按钮
        decryptBtn.onclick = function() {
                var cipherStr = inputText.value.trim();
                var password = keyInput.value.trim();
                var type = algorithm.value;
                var plainText = "";
                if (type == "MD5" || type == "SHA256") {
                    showModal("提示", "MD5、SHA256是不可逆哈希，不能解密！");
                    return;
                }
                if (cipherStr.length <= 0) {
                    showModal("提示", "请输入需要解密的密文！");
                    return;
                }
                try {
                    if (type == "AES") {
                        if (password.length <= 0) {
                            showModal("提示", "请输入解密密钥！");
                            return;
                        }
                        var decryptObj = CryptoJS.AES.decrypt(cipherStr, password);
                        plainText = decryptObj.toString(CryptoJS.enc.Utf8);
                    } else if (type == "DES") {
                        if (password.length <= 0) {
                            showModal("提示", "请输入解密密钥！");
                            return;
                        }
                        var decryptObj = CryptoJS.DES.decrypt(cipherStr, password);
                        plainText = decryptObj.toString(CryptoJS.enc.Utf8);
                    } else if (type == "3DES") {
                        if (password.length <= 0) {
                            showModal("提示", "请输入解密密钥！");
                            return;
                        }
                        var decryptObj = CryptoJS.TripleDES.decrypt(cipherStr, password);
                        plainText = decryptObj.toString(CryptoJS.enc.Utf8);
                    } else if (type == "RC4") {
                        if (password.length <= 0) {
                            showModal("提示", "请输入解密密钥！");
                            return;
                        }
                        var decryptObj = CryptoJS.RC4.decrypt(cipherStr, password);
                        plainText = decryptObj.toString(CryptoJS.enc.Utf8);
                    } else if (type == "Base64") {
                        var wordArray = CryptoJS.enc.Base64.parse(cipherStr);
                        plainText = wordArray.toString(CryptoJS.enc.Utf8);
                    }
                } catch (err) {
                    showModal("解密失败", "密文错误或算法不匹配");
                    return;
                }
                if (plainText == "") {
                    showModal("解密失败", "密钥错误、密文损坏或算法选错");
                    return;
                }
                inputText.value = plainText;
                showModal("解密完成，原文如下", plainText);
            }
            // 清空按钮
        clearBtn.onclick = function() {
            inputText.value = "";
            keyInput.value = "";
            algorithm.value = "AES";
            keyBox.style.display = "block";
            showModal("操作完成", "已清空所有输入内容");
        }
    </script>
</body>

</html>
