<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>加载中</title>
    <style>
        :root {
            --mask: rgba(0, 0, 0, 0.55);
            --card: #ffffff;
            --text: #1d2129;
            --text2: #666666;
            --primary: #000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            user-select: none;
            -webkit-user-select: none;
            background: #fff;
        }
        /* 启动加载页 优化UI */
        .splash {
            width: 100vw;
            height: 100vh;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .splash img {
            width: 60px;
            height: auto;
            object-fit: contain;
            pointer-events: none;
            -webkit-user-drag: none;
            user-select: none;
            margin-bottom: 10px;
        }
        .title {
            margin-top: 1px;
            font-size: 1px;
            color: #333;
            font-family: "Microsoft YaHei", sans-serif;
            font-weight: 500;
        }
        /* 加载动画优化 */
        .loading {
            margin-top: 25px;
            width: 23px;
            height: 23px;
            border: 2.5px solid #fff;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: rotate 0.70s linear infinite;
        }
        @keyframes rotate {
            to { transform: rotate(360deg); }
        }
        /* 通用弹窗遮罩 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--mask);
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .dialog {
            width: 90%;
            max-width: 340px;
            background: var(--card);
            border-radius: 20px;
            padding: 28px 24px;
            animation: pop 0.25s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .dialog-title {
            font-size: 20px;
            color: var(--text);
            text-align: center;
            margin-bottom: 14px;
            font-weight: 500;
        }
        .dialog-desc {
            font-size: 15px;
            color: var(--text2);
            line-height: 1.7;
            text-align: center;
            margin-bottom: 26px;
        }
        /* 清除按钮浏览器默认样式 */
        button {
            background: none;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-appearance: none;
            appearance: none;
        }
        .dialog-btn {
            width: 100%;
            height: 46px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.22s ease;
            background: var(--primary);
            color: #fff;
        }
        .dialog-btn:active {
            transform: scale(0.95);
        }
        /* 版本更新弹窗 */
        .update-dialog .update-edition {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 16px;
        }
        .update-dialog .update-content {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .update-btn-group {
            display: flex;
            gap: 14px;
        }
        .update-btn {
            flex: 1;
            height: 46px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.22s ease;
        }
        .update-btn:active {
            transform: scale(0.95);
        }
        .update-cancel {
            background: #e5e6eb;
            color: var(--text);
        }
        .update-ok {
            background: var(--primary);
            color: #fff;
        }
        /* 原有文字提示隐藏（不再使用） */
        .warn-tip {
            display: none !important;
        }
    </style>
</head>
<body oncontextmenu="return false" oncopy="return false" onselectstart="return false">
    <div class="splash">
        <img src="file-lock-outline.svg" alt="logo">
        <div class="warn-tip">您的系统内置内核过低，可能会出现兼容性问题</div>
    </div>
    <!-- 内核版本过低 弹窗（带确认按钮） -->
    <div class="mask" id="webviewMask">
        <div class="dialog">
            <div class="dialog-title">Android System WebView内核过低提示</div>
            <div class="dialog-desc">您的系统内置内核Android System WebView过低，可能会出现兼容性问题</div>
            <button class="dialog-btn" id="webviewConfirm">我知道了</button>
        </div>
    </div>
    <!-- 原有版本更新弹窗 -->
    <div class="mask" id="updateMask">
        <div class="dialog update-dialog">
            <div class="dialog-title">发现新版本</div>
            <div class="update-edition" id="updateEdition"></div>
            <div class="update-content" id="updateContent"></div>
            <div class="update-btn-group">
                <button class="update-btn update-cancel" id="updateCancel">稍后提醒</button>
                <button class="update-btn update-ok" id="updateOk">立即下载</button>
            </div>
        </div>
    </div>
<script>
    const targetUrl = "index.html";
    const autoJumpDelay = 1000;
    const currentAppVer = "2.0";

    // 版本对比工具
    function isNewVersion(v1, v2) {
        try {
            const a1 = v1.split(".").map(Number);
            const a2 = v2.split(".").map(Number);
            const max = Math.max(a1.length, a2.length);
            for (let i = 0; i < max; i++) {
                const n1 = a1[i] || 0;
                const n2 = a2[i] || 0;
                if (n1 > n2) return true;
                if (n1 < n2) return false;
            }
            return false;
        } catch {
            return false;
        }
    }

    // 判断是否存在打开的弹窗
    function hasOpenMask() {
        const m1 = getComputedStyle(document.getElementById("updateMask")).display === "flex";
        const m2 = getComputedStyle(document.getElementById("webviewMask")).display === "flex";
        return m1 || m2;
    }

    // 直接替换当前页面，不会新开页面、不会误关页面
    function goJump() {
        location.replace(targetUrl);
    }

    // 等待弹窗全部关闭再跳转
    function waitMaskClose() {
        if (!hasOpenMask()) {
            goJump();
            return;
        }
        setTimeout(waitMaskClose, 100);
    }

    // 无弹窗自动跳转
    setTimeout(() => {
        if (!hasOpenMask()) goJump();
    }, autoJumpDelay);

    // 更新弹窗逻辑
(function() {
    // 本地当前版本，改这里
    const currentAppVer = "1.0";
    const UPDATE_USER = "3211488647";
    const UPDATE_APPID = "1163";
    const UPDATE_API_URL = "https://yuju.99kpk.top:81/api/update_obtain.php";

    // 版本对比函数
    function isNewVersion(v1, v2) {
        try {
            const a1 = v1.split(".").map(Number);
            const a2 = v2.split(".").map(Number);
            const maxLen = Math.max(a1.length, a2.length);
            for (let i = 0; i < maxLen; i++) {
                const n1 = a1[i] || 0;
                const n2 = a2[i] || 0;
                if (n1 > n2) return true;
                if (n1 < n2) return false;
            }
            return false;
        } catch {
            return false;
        }
    }

    setTimeout(function() {
        const updateMask = document.getElementById("updateMask");
        const updateEdition = document.getElementById("updateEdition");
        const updateContent = document.getElementById("updateContent");
        const updateCancel = document.getElementById("updateCancel");
        const updateOk = document.getElementById("updateOk");
        if (!updateMask || !updateCancel || !updateOk) return;
        let downLink = "";

        // 关闭弹窗触发等待跳转
        updateCancel.onclick = function() {
            updateMask.style.display = "none";
            waitMaskClose();
        };
        updateMask.onclick = function(e) {
            if (e.target === updateMask) {
                updateMask.style.display = "none";
                waitMaskClose();
            }
        };
        // 下载只新开窗口
        updateOk.onclick = function() {
            if (downLink) window.open(downLink, "_blank");
        };

        function checkUpdate() {
            const reqUrl = UPDATE_API_URL + "?user=" + UPDATE_USER + "&appid=" + UPDATE_APPID;
            const xhr = new XMLHttpRequest();
            xhr.open("GET", reqUrl, true);
            xhr.timeout = 5000;
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        const res = JSON.parse(xhr.responseText);
                        // 条件：接口正常、edition≠no、线上版本大于2.0才弹窗
                        if (res.code === "1" && res.edition !== "no" && isNewVersion(res.edition, currentAppVer)) {
                            updateEdition.innerText = "最新版本：" + res.edition;
                            updateContent.innerText = res.content;
                            downLink = res.link || "";
                            updateMask.style.display = "flex";
                        }
                    } catch {}
                }
            };
            xhr.send();
        }
        checkUpdate();
    }, 100);
})();
    // 内核弹窗逻辑
    const wvMask = document.getElementById("webviewMask");
    const wvBtn = document.getElementById("webviewConfirm");
    wvBtn.onclick = () => {
        wvMask.style.display = "none";
        waitMaskClose();
    };
    wvMask.onclick = e => {
        if (e.target === wvMask) {
            wvMask.style.display = "none";
            waitMaskClose();
        }
    };

    // 检测内核版本
    function checkWebVer() {
        const ua = navigator.userAgent.toLowerCase();
        let v = 999;
        const wvReg = ua.match(/android.*wv.*chrome\/(\d+)/);
        const chromeReg = ua.match(/chrome\/(\d+)/);
        if (wvReg) v = parseInt(wvReg[1]);
        else if (chromeReg && ua.includes("android")) v = parseInt(chromeReg[1]);
        if (v < 99) wvMask.style.display = "flex";
    }
    checkWebVer();

    // 预加载iframe
    const iframe = document.createElement("iframe");
    iframe.src = targetUrl;
    iframe.style.cssText = "width:0;height:0;position:absolute;opacity:0;z-index:-999;";
    document.body.appendChild(iframe);
</script>
</body>
</html>
